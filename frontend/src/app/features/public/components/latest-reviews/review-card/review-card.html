<article class="review">
  <div class="review-image">
    <img [src]="review.movie.imageUrl" [alt]="review.movie.imageAlt">
    <div class="rating-badge" [attr.aria-label]="'Puntuación: ' + review.rating + ' sobre 10'">
      <span class="clapper-icon" aria-hidden="true"></span>
      <span>{{ review.rating }}/10</span>
    </div>
  </div>

  <div class="review-body">
    <header class="review-header">
      <h3>
        {{ review.movie.title }}
        <span>{{ review.movie.year }}</span>
      </h3>
      <p>Dirigida por {{ review.movie.director }}</p>
    </header>

    <div class="movie-rule" aria-hidden="true"></div>

    <p class="review-quote">“{{ review.highlightedQuote }}”</p>
    <p class="fragment">“{{ review.excerpt }}”</p>

    <footer class="review-footer">
      <div class="review-author">
        @if (review.author.avatarUrl) {
          <img [src]="review.author.avatarUrl" [alt]="'Avatar de ' + review.author.name">
        } @else {
          <span aria-hidden="true">{{ authorInitial }}</span>
        }
        <p>{{ review.author.name }}</p>
      </div>
    </footer>
  </div>
</article>
