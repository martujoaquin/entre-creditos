<section class="login-page">
  <p class="login-subtitle">Comenzá a compartir tus historias de cine.</p>

  <article class="login-card">
    <h1>Crear cuenta</h1>

    <form class="login-form">
      <label class="login-field">
        <span>Nombre completo</span>
        <input type="text" name="name" placeholder="Tu nombre" autocomplete="name">
      </label>

      <label class="login-field">
        <span>Correo electrónico</span>
        <input type="email" name="email" placeholder="tu@email.com" autocomplete="email">
      </label>

      <label class="login-field">
        <span>Contraseña</span>
        <input
          type="password"
          name="password"
          placeholder="Mínimo 8 caracteres"
          autocomplete="new-password"
          minlength="8"
        >
      </label>

      <label class="login-field">
        <span>Confirmar contraseña</span>
        <input
          type="password"
          name="confirm-password"
          placeholder="Repetí tu contraseña"
          autocomplete="new-password"
          minlength="8"
        >
      </label>

      <button class="btn-primary" type="submit">Crear cuenta</button>
    </form>

    <p class="login-register">
      ¿Ya tenés cuenta?
      <a routerLink="/login">Iniciar sesión</a>
    </p>
  </article>

  <a class="login-home-link" routerLink="/">← Volver al inicio</a>
</section>
